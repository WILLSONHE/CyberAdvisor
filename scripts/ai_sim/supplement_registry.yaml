# AI 模拟盘补充指标注册表
# Agent 仅可通过 data_requests 对下列 metric 执行 enable / disable（不可自定义 HTTP）
# 未注册指标 → Wiki/数据/待扩展指标.md

metrics:
  kline_60m:
    label: 60分钟K线（上证/深成指/创业板）
    default: true
    always_on: true
    fetcher: kline_60m

  northbound:
    label: 北向/南向资金当日快照
    default: true
    always_on: false
    fetcher: northbound

  northbound_history:
    label: 北向通道近10日历史
    default: true
    always_on: false
    fetcher: northbound_history

  overnight:
    label: 隔夜外盘（纳指/SOXX/道指/恒生国企）
    default: true
    always_on: false
    phase_hint: pre_open
    fetcher: overnight

  us_vix:
    label: VIX 恐慌指数（腾讯 usVIX 代理）
    default: false
    always_on: false
    fetcher: us_vix

  us_10y_yield:
    label: 美国10年期国债收益率代理（腾讯 usTNX）
    default: false
    always_on: false
    fetcher: us_10y_yield

  minute_kline:
    label: 分钟级K线（做T精确时点；标的级）
    default: true
    always_on: false
    fetcher: minute_kline

  rs_vs_hs300:
    label: 个股相对强度 RS（相对沪深300，20日）
    default: true
    always_on: false
    fetcher: rs_vs_hs300
